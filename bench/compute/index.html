<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Compute bench</title>
  <script src="kernels.js"></script>
  <script src="wasm_exec.js"></script>
  <script>
    // Generic timing harness used identically for JS and Go/TinyGo kernels.
    window.__timeKernel = function (impl, name, size, warmup, runs) {
      const fn = (impl === 'js' ? window.jsKernels : window.goKernels)[name];
      let result;
      for (let i = 0; i < warmup; i++) result = fn(size);
      const times = [];
      for (let i = 0; i < runs; i++) {
        const t0 = performance.now();
        result = fn(size);
        times.push(performance.now() - t0);
      }
      times.sort((a, b) => a - b);
      return { median: times[times.length >> 1], result };
    };

    const go = new Go();
    WebAssembly.instantiateStreaming(fetch("app.wasm"), go.importObject).then((r) => {
      go.run(r.instance);
    });
  </script>
</head>
<body></body>
</html>
